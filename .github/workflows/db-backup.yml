name: DB Backup

on:
  schedule:
    - cron: "0 18 * * *" # Daily at 03:00 KST (18:00 UTC)
  workflow_dispatch: # Manual trigger

jobs:
  backup:
    name: PostgreSQL Backup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run backup
        run: |
          pg_dump "$DATABASE_URL" | gzip > backup.sql.gz
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          aws s3 cp backup.sql.gz "s3://${{ secrets.S3_BACKUP_BUCKET }}/db-backups/dongdong_${TIMESTAMP}.sql.gz"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2

      - name: Cleanup old backups (30 days)
        run: |
          CUTOFF=$(date -d '-30 days' +%Y%m%d)
          aws s3 ls "s3://${{ secrets.S3_BACKUP_BUCKET }}/db-backups/" | while read -r line; do
            FILE=$(echo "$line" | awk '{print $4}')
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{8}' | head -1)
            if [ -n "$FILE_DATE" ] && [ "$FILE_DATE" -lt "$CUTOFF" ]; then
              aws s3 rm "s3://${{ secrets.S3_BACKUP_BUCKET }}/db-backups/$FILE"
            fi
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
